<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Firebase Login Test</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1f1f1f;
  color: #eee;
  padding: 20px;
}
.panel {
  background: #333;
  padding: 20px;
  border-radius: 8px;
  max-width: 400px;
}
input, button {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
}
button {
  background: #f4c430;
  border: none;
  cursor: pointer;
}
#authStatus {
  margin-top: 10px;
  color: #ccc;
}
</style>
</head>
<body>

<h1>🔥 Firebase Auth Test</h1>

<div class="panel" id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="username" placeholder="Username (register only)">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <p id="authStatus"></p>
</div>

<div class="panel" id="app" style="display:none;">
  <p id="userInfo"></p>
  <button onclick="logout()">Logout</button>
</div>

<!-- ✅✅✅ FIREBASE SDKs (CORRECT AND REQUIRED) ✅✅✅ -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* 🔴 REPLACE WITH YOUR REAL FIREBASE CONFIG */
firebase.initializeApp({
  apiKey: "AIzaSyCROUwb_jRNjHospqu86fvL9P4ajCe94c8",
  authDomain: "barthiiny.firebaseapp.com",
  projectId: "barthiiny",
  storageBucket: "barthiiny.firebasestorage.app",
  messagingSenderId: "496508474938",
  appId: "1:496508474938:web:3eae7b5b67fbcb77af8703",
  measurementId: "G-8ZZMBT7913"
});

/* ✅ Firebase initialized */
const auth = firebase.auth();
const db = firebase.firestore();

/* ===== REGISTER ===== */
function register() {
  authStatus.textContent = "Registering...";
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .then(cred => {
      return db.collection("users").doc(cred.user.uid).set({
        username: username.value
      });
    })
    .then(() => {
      authStatus.textContent = "Registered successfully ✅";
    })
    .catch(err => {
      authStatus.textContent = err.message;
      console.error(err);
    });
}

/* ===== LOGIN ===== */
function login() {
  authStatus.textContent = "Logging in...";
  auth.signInWithEmailAndPassword(email.value, password.value)
    .then(() => {
      authStatus.textContent = "Login successful ✅";
    })
    .catch(err => {
      authStatus.textContent = err.message;
      console.error(err);
    });
}

/* ===== LOGOUT ===== */
function logout() {
  auth.signOut();
}

/* ===== AUTH STATE ===== */
auth.onAuthStateChanged(user => {
  console.log("Auth state changed:", user);

  if (user) {
    auth.style.display = "none";
    app.style.display = "block";
    userInfo.textContent = "Logged in as " + user.email;
  } else {
    auth.style.display = "block";
    app.style.display = "none";
  }
});
</script>

</body>
</html>
