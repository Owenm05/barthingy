<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bar Management System</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1f1f1f;
  color: #eee;
  padding: 20px;
}
.panel {
  background: #333;
  padding: 20px;
  border-radius: 8px;
  max-width: 1100px;
  margin-bottom: 20px;
}
input, select, button {
  padding: 8px;
  width: 100%;
  margin: 6px 0;
}
button {
  background: #f4c430;
  border: none;
  cursor: pointer;
}
.tabs button {
  width: auto;
  margin-right: 5px;
}
table {
  width: 100%;
  border-collapse: collapse;
}
td, th {
  border: 1px solid #555;
  padding: 6px;
  text-align: center;
}
</style>
</head>
<body>

<h1>🍺 Bar Management System</h1>

<!-- AUTH -->
<div id="authPanel" class="panel">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="username" placeholder="Username (register)">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <p id="authStatus"></p>
</div>

<!-- APP -->
<div id="appPanel" class="panel" style="display:none;">
  <p id="userInfo"></p>

  <div class="tabs">
    <button onclick="showTab('bars')">Bars</button>
    <button onclick="showTab('invites')">Invites</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- BARS -->
  <div id="barsTab">
    <h3>Your Bars</h3>
    <ul id="barList"></ul>

    <h3>Create Bar</h3>
    <input id="newBarName" placeholder="Bar name">
    <button onclick="createBar()">Create</button>

    <div id="barAdmin" style="display:none;">
      <h3>Moderation</h3>
      <table>
        <thead>
          <tr><th>User</th><th>Role</th><th>Actions</th></tr>
        </thead>
        <tbody id="memberTable"></tbody>
      </table>
    </div>
  </div>

  <!-- INVITES -->
  <div id="invitesTab" style="display:none;">
    <h3>Send Invite</h3>
    <input id="inviteUsername" placeholder="Username">
    <select id="inviteBar"></select>
    <button onclick="sendInvite()">Invite</button>

    <h3>Your Invites</h3>
    <ul id="inviteList"></ul>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* 🔴 PUT YOUR FIREBASE CONFIG HERE */
firebase.initializeApp({
  apiKey: "AIzaSyCROUwb_jRNjHospqu86fvL9P4ajCe94c8",
  authDomain: "barthiiny.firebaseapp.com",
  projectId: "barthiiny",
  storageBucket: "barthiiny.firebasestorage.app",
  messagingSenderId: "496508474938",
  appId: "1:496508474938:web:3eae7b5b67fbcb77af8703",
  measurementId: "G-8ZZMBT7913"
});

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser, currentUsername, currentBarId;

/* AUTH */
function register() {
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .then(c => db.collection("users").doc(c.user.uid).set({
      username: username.value
    }))
    .catch(e => authStatus.textContent = e.message);
}
function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(e => authStatus.textContent = e.message);
}
function logout() { auth.signOut(); }

/* STATE */
auth.onAuthStateChanged(async u => {
  if (!u) {
    authPanel.style.display = "block";
    appPanel.style.display = "none";
    return;
  }
  currentUser = u;
  const snap = await db.collection("users").doc(u.uid).get();
  currentUsername = snap.data().username;
  userInfo.textContent = "Logged in as " + currentUsername;
  authPanel.style.display = "none";
  appPanel.style.display = "block";
  loadBars();
  loadInvites();
});

/* UI */
function showTab(t) {
  barsTab.style.display = t === "bars" ? "block" : "none";
  invitesTab.style.display = t === "invites" ? "block" : "none";
}

/* BARS */
function createBar() {
  db.collection("bars").add({
    name: newBarName.value,
    owner: currentUser.uid,
    members: { [currentUser.uid]: "Owner" }
  });
  newBarName.value = "";
}

function loadBars() {
  barList.innerHTML = "";
  inviteBar.innerHTML = "";
  db.collection("bars").onSnapshot(s => {
    barList.innerHTML = "";
    inviteBar.innerHTML = "";
    s.forEach(d => {
      const b = d.data();
      if (b.members[currentUser.uid]) {
        barList.innerHTML += `<li onclick="selectBar('${d.id}')">${b.name}</li>`;
        inviteBar.innerHTML += `<option value="${d.id}">${b.name}</option>`;
      }
    });
  });
}

function selectBar(id) {
  currentBarId = id;
  showMembers();
}

/* MODERATION */
async function showMembers() {
  const doc = await db.collection("bars").doc(currentBarId).get();
  const bar = doc.data();
  const myRole = bar.members[currentUser.uid];
  memberTable.innerHTML = "";
  barAdmin.style.display = myRole ? "block" : "none";

  for (let uid in bar.members) {
    const userSnap = await db.collection("users").doc(uid).get();
    const uname = userSnap.data().username;
    const role = bar.members[uid];

    let actions = "";
    if (["Owner","Admin"].includes(myRole) && role !== "Owner") {
      actions += `<select onchange="setRole('${uid}', this.value)">
        <option>Member</option>
        <option>Moderator</option>
        <option>Admin</option>
      </select>`;
      actions += `<button onclick="kick('${uid}')">Kick</button>`;
    }

    memberTable.innerHTML += `<tr><td>${uname}</td><td>${role}</td><td>${actions}</td></tr>`;
  }
}

function setRole(uid, role) {
  db.collection("bars").doc(currentBarId).update({
    [`members.${uid}`]: role
  });
}

function kick(uid) {
  db.collection("bars").doc(currentBarId).update({
    [`members.${uid}`]: firebase.firestore.FieldValue.delete()
  });
}

/* INVITES */
function sendInvite() {
  db.collection("invites").add({
    toUsername: inviteUsername.value,
    barId: inviteBar.value
  });
  inviteUsername.value = "";
}

function loadInvites() {
  inviteList.innerHTML = "";
  db.collection("invites")
    .where("toUsername","==",currentUsername)
    .onSnapshot(s => {
      inviteList.innerHTML = "";
      s.forEach(d => {
        inviteList.innerHTML += `
          <li>
            Invitation
            <button onclick="acceptInvite('${d.id}','${d.data().barId}')">Accept</button>
            <button onclick="declineInvite('${d.id}')">Decline</button>
          </li>`;
      });
    });
}

function acceptInvite(id, barId) {
  db.collection("bars").doc(barId).update({
    [`members.${currentUser.uid}`]: "Member"
  });
  db.collection("invites").doc(id).delete();
}
function declineInvite(id) {
  db.collection("invites").doc(id).delete();
}
</script>

</body>
</html>
