<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bar Management System</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #1f1f1f;
    color: #eee;
    padding: 20px;
}
h1, h2, h3 {
    color: #f4c430;
}
.panel {
    background: #333;
    padding: 20px;
    border-radius: 8px;
    max-width: 900px;
    margin-bottom: 20px;
}
input, select, button {
    padding: 8px;
    width: 100%;
    margin: 5px 0;
}
button {
    background: #f4c430;
    border: none;
    cursor: pointer;
}
.tabs button {
    width: auto;
    margin-right: 5px;
}
ul {
    list-style: none;
    padding: 0;
}
li {
    padding: 6px;
    border-bottom: 1px solid #444;
}
</style>
</head>
<body>

<h1>🍺 Bar Management System</h1>

<!-- AUTH -->
<div id="auth" class="panel">
    <h2>Login / Register</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <input id="username" placeholder="Username (register only)">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="panel" style="display:none;">
    <p id="userInfo"></p>

    <div class="tabs">
        <button onclick="showTab('bars')">Bars</button>
        <button onclick="showTab('invites')">Invites</button>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- BARS TAB -->
    <div id="barsTab">
        <h3>Your Bars</h3>
        <ul id="barList"></ul>

        <h3>Create New Bar</h3>
        <input id="newBarName" placeholder="Bar name">
        <button onclick="createBar()">Create Bar</button>
    </div>

    <!-- INVITES TAB -->
    <div id="invitesTab" style="display:none;">
        <h3>Send Invite</h3>
        <input id="inviteUsername" placeholder="Username to invite">
        <select id="inviteBar"></select>
        <button onclick="sendInvite()">Send Invite</button>

        <h3>Your Invites</h3>
        <ul id="inviteList"></ul>
    </div>
</div>

<!-- FIREBASE SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* ================= FIREBASE CONFIG ================= */
/* 🔴 REPLACE WITH YOUR REAL CONFIG FROM FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCROUwb_jRNjHospqu86fvL9P4ajCe94c8",
  authDomain: "barthiiny.firebaseapp.com",
  projectId: "barthiiny",
  storageBucket: "barthiiny.firebasestorage.app",
  messagingSenderId: "496508474938",
  appId: "1:496508474938:web:3eae7b5b67fbcb77af8703",
  measurementId: "G-8ZZMBT7913"
};

const auth = firebase.auth();
const db = firebase.firestore();

/* ================= STATE ================= */

let currentUser = null;
let currentUsername = null;

/* ================= AUTH ================= */

function register() {
    if (!email.value || !password.value || !username.value) {
        alert("Fill all fields");
        return;
    }

    auth.createUserWithEmailAndPassword(email.value, password.value)
        .then(cred => {
            return db.collection("users").doc(cred.user.uid).set({
                username: username.value
            });
        })
        .catch(err => alert(err.message));
}

function login() {
    auth.signInWithEmailAndPassword(email.value, password.value)
        .catch(err => alert(err.message));
}

function logout() {
    auth.signOut();
}

auth.onAuthStateChanged(async user => {
    if (!user) {
        authDiv(true);
        return;
    }

    currentUser = user;
    const snap = await db.collection("users").doc(user.uid).get();
    currentUsername = snap.data().username;

    userInfo.textContent = `Logged in as ${currentUsername}`;
    authDiv(false);

    loadBars();
    loadInvites();
});

/* ================= UI ================= */

function authDiv(showAuth) {
    auth.style.display = showAuth ? "block" : "none";
    app.style.display = showAuth ? "none" : "block";
}

function showTab(tab) {
    barsTab.style.display = tab === "bars" ? "block" : "none";
    invitesTab.style.display = tab === "invites" ? "block" : "none";
}

/* ================= BARS ================= */

function createBar() {
    if (!newBarName.value) return alert("Enter bar name");

    db.collection("bars").add({
        name: newBarName.value,
        members: [currentUser.uid]
    });

    newBarName.value = "";
}

function loadBars() {
    barList.innerHTML = "";
    inviteBar.innerHTML = "";

    db.collection("bars").onSnapshot(snapshot => {
        barList.innerHTML = "";
        inviteBar.innerHTML = "";

        snapshot.forEach(doc => {
            const bar = doc.data();
            if (bar.members.includes(currentUser.uid)) {
                barList.innerHTML += `<li>${bar.name}</li>`;
                inviteBar.innerHTML += `<option value="${doc.id}">${bar.name}</option>`;
            }
        });
    });
}

/* ================= INVITES ================= */

async function sendInvite() {
    if (!inviteUsername.value) return alert("Enter a username");

    // Check user exists
    const usersSnap = await db.collection("users")
        .where("username", "==", inviteUsername.value)
        .get();

    if (usersSnap.empty) {
        alert("User not found");
        return;
    }

    db.collection("invites").add({
        toUsername: inviteUsername.value,
        barId: inviteBar.value,
        from: currentUsername
    });

    inviteUsername.value = "";
    alert("Invite sent");
}

function loadInvites() {
    inviteList.innerHTML = "";

    db.collection("invites")
        .where("toUsername", "==", currentUsername)
        .onSnapshot(snapshot => {
            inviteList.innerHTML = "";
            snapshot.forEach(doc => {
                const inv = doc.data();
                inviteList.innerHTML += `
                    <li>
                        Invite to bar: ${inv.barId}
                        <button onclick="acceptInvite('${doc.id}','${inv.barId}')">Accept</button>
                        <button onclick="declineInvite('${doc.id}')">Decline</button>
                    </li>
                `;
            });
        });
}

function acceptInvite(inviteId, barId) {
    db.collection("bars").doc(barId).update({
        members: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
    });
    db.collection("invites").doc(inviteId).delete();
}

function declineInvite(inviteId) {
    db.collection("invites").doc(inviteId).delete();
}
</script>

</body>
</html>
