<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bar Management System</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #1f1f1f;
    color: #eee;
    padding: 20px;
}
h1, h2 {
    color: #f4c430;
}
input, button, select {
    padding: 8px;
    margin: 5px 0;
    width: 100%;
}
button {
    background: #f4c430;
    border: none;
    cursor: pointer;
}
.panel {
    background: #333;
    padding: 20px;
    border-radius: 8px;
    max-width: 900px;
    margin-bottom: 20px;
}
.tabs button {
    width: auto;
    margin-right: 5px;
}
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    border: 1px solid #444;
    padding: 8px;
    text-align: center;
}
</style>
</head>
<body>

<h1>🍺 Bar Management System</h1>

<!-- AUTH -->
<div id="auth" class="panel">
    <h2>Login</h2>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password">
    <button onclick="login()">Login</button>

    <h2>Register</h2>
    <input id="regUser" placeholder="Username">
    <input id="regPass" type="password">
    <button onclick="register()">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="panel" style="display:none;">
    <p id="userInfo"></p>
    <div class="tabs">
        <button onclick="showTab('users')">Users</button>
        <button onclick="showTab('moderation')">Moderation</button>
        <button onclick="showTab('invites')">Invites</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<!-- USERS TAB -->
<div id="usersTab" class="panel" style="display:none;">
    <h2>Registered Users</h2>
    <table>
        <thead><tr><th>Username</th><th>Role</th></tr></thead>
        <tbody id="usersList"></tbody>
    </table>
</div>

<!-- MODERATION TAB -->
<div id="moderationTab" class="panel" style="display:none;">
    <h2>Moderation</h2>

    <input id="inviteUser" placeholder="Invite existing user by username">
    <button onclick="sendInvite()">Send Invite</button>

    <table>
        <thead><tr><th>User</th><th>Role</th><th>Actions</th></tr></thead>
        <tbody id="modList"></tbody>
    </table>
</div>

<!-- INVITES TAB -->
<div id="invitesTab" class="panel" style="display:none;">
    <h2>Your Invites</h2>
    <table>
        <thead><tr><th>Bar</th><th>Action</th></tr></thead>
        <tbody id="inviteList"></tbody>
    </table>
</div>

<script>
/* ===== DATA ===== */

let users = JSON.parse(localStorage.getItem("users")) || [
    { username: "admin", password: "admin", role: "Admin" }
];

let bars = JSON.parse(localStorage.getItem("bars")) || [
    { id: "main-bar", name: "Main Bar", members: ["admin"] }
];

let invites = JSON.parse(localStorage.getItem("invites")) || {};
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

function save() {
    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("bars", JSON.stringify(bars));
    localStorage.setItem("invites", JSON.stringify(invites));
}

/* ===== AUTH ===== */

function register() {
    if (!regUser.value || !regPass.value) return alert("Fill all fields");
    if (users.some(u => u.username === regUser.value)) return alert("User exists");

    users.push({ username: regUser.value, password: regPass.value, role: "Staff" });
    save();
    alert("Registered successfully");
}

function login() {
    const user = users.find(
        u => u.username === loginUser.value && u.password === loginPass.value
    );
    if (!user) return alert("Invalid login");
    if (user.role === "Banned") return alert("You are banned");

    currentUser = user;
    localStorage.setItem("currentUser", JSON.stringify(user));
    init();
}

function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}

/* ===== UI ===== */

function init() {
    auth.style.display = "none";
    dashboard.style.display = "block";
    userInfo.textContent = `Logged in as ${currentUser.username} (${currentUser.role})`;
    showTab("users");
}

function showTab(tab) {
    usersTab.style.display = tab === "users" ? "block" : "none";
    moderationTab.style.display = tab === "moderation" ? "block" : "none";
    invitesTab.style.display = tab === "invites" ? "block" : "none";

    if (tab === "users") loadUsers();
    if (tab === "moderation") loadModeration();
    if (tab === "invites") loadInvites();
}

/* ===== USERS ===== */

function loadUsers() {
    usersList.innerHTML = "";
    users.forEach(u => {
        usersList.innerHTML += `<tr><td>${u.username}</td><td>${u.role}</td></tr>`;
    });
}

/* ===== MODERATION ===== */

function loadModeration() {
    modList.innerHTML = "";
    users.forEach((u, i) => {
        if (u.username === currentUser.username) return;

        let actions = `<button onclick="kick(${i})">Kick</button>`;

        if (currentUser.role === "Admin") {
            actions += `
                <button onclick="ban(${i})">Ban</button>
                <select onchange="setRole(${i}, this.value)">
                    <option value="Staff">Staff</option>
                    <option value="Moderator">Moderator</option>
                    <option value="Admin">Admin</option>
                </select>
            `;
        }

        modList.innerHTML += `
            <tr>
                <td>${u.username}</td>
                <td>${u.role}</td>
                <td>${actions}</td>
            </tr>
        `;
    });
}

function kick(i) {
    alert(users[i].username + " was kicked");
}

function ban(i) {
    users[i].role = "Banned";
    save();
    loadModeration();
}

function setRole(i, role) {
    users[i].role = role;
    save();
    loadModeration();
}

/* ===== INVITES ===== */

function sendInvite() {
    const name = inviteUser.value.trim();

    const exists = users.some(u => u.username === name);
    if (!exists) return alert("User does not exist");

    invites[name] = invites[name] || [];
    if (invites[name].includes("main-bar")) return alert("Already invited");

    invites[name].push("main-bar");
    save();
    alert("Invite sent");
}

function loadInvites() {
    inviteList.innerHTML = "";
    const list = invites[currentUser.username] || [];

    if (!list.length) {
        inviteList.innerHTML = `<tr><td colspan="2">No invites</td></tr>`;
        return;
    }

    list.forEach(barId => {
        inviteList.innerHTML += `
            <tr>
                <td>Main Bar</td>
                <td>
                    <button onclick="acceptInvite('${barId}')">Accept</button>
                    <button onclick="declineInvite('${barId}')">Decline</button>
                </td>
            </tr>
        `;
    });
}

function acceptInvite(barId) {
    const bar = bars.find(b => b.id === barId);
    bar.members.push(currentUser.username);
    invites[currentUser.username] =
        invites[currentUser.username].filter(i => i !== barId);
    save();
    loadInvites();
}

function declineInvite(barId) {
    invites[currentUser.username] =
        invites[currentUser.username].filter(i => i !== barId);
    save();
    loadInvites();
}

if (currentUser) init();
</script>

</body>
</html>
