<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bar Management & Scheduling</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1f1f1f;
  color: #eee;
  padding: 20px;
}
.panel {
  background: #333;
  padding: 20px;
  border-radius: 8px;
  max-width: 1200px;
}
input, select, button {
  padding: 8px;
  width: 100%;
  margin: 5px 0;
}
button {
  background: #f4c430;
  border: none;
  cursor: pointer;
}
.tabs button {
  width: auto;
  margin-right: 5px;
}
table {
  width: 100%;
  border-collapse: collapse;
}
td, th {
  border: 1px solid #555;
  padding: 6px;
}
</style>
</head>
<body>

<h1>🍺 Bar Management & Scheduling</h1>

<!-- AUTH -->
<div id="authPanel" class="panel">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="username" placeholder="Username (register)">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <p id="authStatus"></p>
</div>

<!-- APP -->
<div id="appPanel" class="panel" style="display:none;">
  <p id="userInfo"></p>

  <div class="tabs">
    <button onclick="showTab('bars')">Bars</button>
    <button onclick="showTab('schedule')">Schedule</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="barsTab">
    <ul id="barList"></ul>
    <input id="newBarName" placeholder="New bar name">
    <button onclick="createBar()">Create Bar</button>
  </div>

  <div id="scheduleTab" style="display:none;">
    <select id="scheduleUser"></select>

    <label><input type="checkbox" value="Bartender" class="role"> Bartender</label>
    <label><input type="checkbox" value="Security" class="role"> Security</label>

    <input type="date" id="date">
    <input type="time" id="start">
    <input type="time" id="end">

    <button onclick="assign()">Assign Shift</button>

    <table>
      <thead>
        <tr><th>User</th><th>Roles</th><th>Date</th><th>Time</th></tr>
      </thead>
      <tbody id="scheduleTable"></tbody>
    </table>
  </div>
</div>

<!-- ✅✅✅ FIREBASE SDKs (CORRECT) ✅✅✅ -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyCROUwb_jRNjHospqu86fvL9P4ajCe94c8",
  authDomain: "barthiiny.firebaseapp.com",
  projectId: "barthiiny",
  storageBucket: "barthiiny.firebasestorage.app",
  messagingSenderId: "496508474938",
  appId: "1:496508474938:web:3eae7b5b67fbcb77af8703",
  measurementId: "G-8ZZMBT7913"
});

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser, currentBarId;

/* AUTH */
function register() {
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .then(c => db.collection("users").doc(c.user.uid).set({ username: username.value }))
    .catch(e => authStatus.textContent = e.message);
}
function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(e => authStatus.textContent = e.message);
}
function logout() { auth.signOut(); }

/* STATE */
auth.onAuthStateChanged(async u => {
  if (!u) {
    authPanel.style.display = "block";
    appPanel.style.display = "none";
    return;
  }
  currentUser = u;
  authPanel.style.display = "none";
  appPanel.style.display = "block";
  loadBars();
});

/* UI */
function showTab(t) {
  barsTab.style.display = t === "bars" ? "block" : "none";
  scheduleTab.style.display = t === "schedule" ? "block" : "none";
}

/* BARS */
function createBar() {
  db.collection("bars").add({
    name: newBarName.value,
    members: { [currentUser.uid]: ["Owner"] }
  });
}
function loadBars() {
  barList.innerHTML = "";
  db.collection("bars").onSnapshot(s => {
    barList.innerHTML = "";
    s.forEach(d => {
      const b = d.data();
      if (b.members[currentUser.uid]) {
        barList.innerHTML += `<li onclick="selectBar('${d.id}')">${b.name}</li>`;
      }
    });
  });
}
function selectBar(id) {
  currentBarId = id;
  loadMembers();
  loadSchedule();
}

/* SCHEDULING */
async function loadMembers() {
  const bar = (await db.collection("bars").doc(currentBarId).get()).data();
  scheduleUser.innerHTML = "";
  for (let uid in bar.members) {
    const u = await db.collection("users").doc(uid).get();
    scheduleUser.innerHTML += `<option value="${uid}">${u.data().username}</option>`;
  }
}

function assign() {
  const roles = [...document.querySelectorAll(".role:checked")].map(r => r.value);
  db.collection("schedules").add({
    barId: currentBarId,
    userId: scheduleUser.value,
    roles,
    date: date.value,
    start: start.value,
    end: end.value
  });
}

function loadSchedule() {
  scheduleTable.innerHTML = "";
  db.collection("schedules")
    .where("barId","==",currentBarId)
    .onSnapshot(async s => {
      scheduleTable.innerHTML = "";
      for (let d of s.docs) {
        const sc = d.data();
        const u = await db.collection("users").doc(sc.userId).get();
        scheduleTable.innerHTML += `
          <tr>
            <td>${u.data().username}</td>
            <td>${sc.roles.join(", ")}</td>
            <td>${sc.date}</td>
            <td>${sc.start} - ${sc.end}</td>
          </tr>`;
      }
    });
}
</script>

</body>
</html>
``
