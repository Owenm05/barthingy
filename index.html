<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bar Management System</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #1f1f1f;
    color: #eee;
    padding: 20px;
}
h1, h2 {
    color: #f4c430;
}
input, button, select {
    padding: 8px;
    margin: 5px 0;
    width: 100%;
}
button {
    background: #f4c430;
    border: none;
    cursor: pointer;
}
button:hover {
    background: #d9aa1e;
}
.panel {
    background: #333;
    padding: 20px;
    border-radius: 8px;
    max-width: 800px;
    margin-bottom: 20px;
}
.tabs button {
    width: auto;
    margin-right: 5px;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}
th, td {
    border: 1px solid #444;
    padding: 8px;
    text-align: center;
}
</style>
</head>
<body>

<h1>🍺 Bar Management System</h1>

<!-- AUTH -->
<div id="auth" class="panel">
    <h2>Login</h2>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <h2>Register</h2>
    <input id="regUser" placeholder="Username">
    <input id="regPass" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="panel" style="display:none;">
    <p id="userInfo"></p>
    <div class="tabs">
        <button onclick="showTab('users')">Users</button>
        <button onclick="showTab('moderation')">Moderation</button>
        <button onclick="showTab('invites')">Invites</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<!-- USERS TAB -->
<div id="usersTab" class="panel" style="display:none;">
    <h2>Users</h2>
    <div class="tabs">
        <button onclick="filterUsers('Admin')">Admins</button>
        <button onclick="filterUsers('Moderator')">Moderators</button>
        <button onclick="filterUsers('Staff')">Users</button>
        <button onclick="filterUsers('Banned')">Banned</button>
    </div>
    <table>
        <thead>
            <tr><th>Username</th><th>Role</th></tr>
        </thead>
        <tbody id="usersList"></tbody>
    </table>
</div>

<!-- MODERATION TAB -->
<div id="moderationTab" class="panel" style="display:none;">
    <h2>Moderation</h2>

    <input id="inviteUser" placeholder="Invite user by username">
    <button onclick="sendInvite()">Send Invite</button>

    <table>
        <thead>
            <tr>
                <th>Username</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="modList"></tbody>
    </table>
</div>

<!-- INVITES TAB -->
<div id="invitesTab" class="panel" style="display:none;">
    <h2>Your Bar Invites</h2>
    <table>
        <thead>
            <tr>
                <th>Bar</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="inviteList"></tbody>
    </table>
</div>

<script>
/* ================= DATA ================= */

let users = JSON.parse(localStorage.getItem("users")) || [
    { username: "admin", password: "admin", role: "Admin" }
];

let bars = JSON.parse(localStorage.getItem("bars")) || [
    { id: "main-bar", name: "The Main Bar", members: ["admin"] }
];

let invites = JSON.parse(localStorage.getItem("invites")) || {};
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

/* ================= UTIL ================= */

function saveAll() {
    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("bars", JSON.stringify(bars));
    localStorage.setItem("invites", JSON.stringify(invites));
}

/* ================= AUTH ================= */

function register() {
    if (!regUser.value || !regPass.value) return alert("Fill all fields");
    if (users.some(u => u.username === regUser.value)) return alert("User exists");
    users.push({ username: regUser.value, password: regPass.value, role: "Staff" });
    saveAll();
    alert("Registered");
}

function login() {
    const user = users.find(u =>
        u.username === loginUser.value &&
        u.password === loginPass.value
    );
    if (!user) return alert("Invalid login");
    if (user.role === "Banned") return alert("You are banned");
    currentUser = user;
    localStorage.setItem("currentUser", JSON.stringify(user));
    init();
}

function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}

/* ================= INITIALIZE ================= */

function init() {
    auth.style.display = "none";
    dashboard.style.display = "block";
    userInfo.textContent = `Logged in as ${currentUser.username} (${currentUser.role})`;
    showTab("users");
}

/* ================= TABS ================= */

function showTab(tab) {
    usersTab.style.display = tab === "users" ? "block" : "none";
    moderationTab.style.display = tab === "moderation" ? "block" : "none";
    invitesTab.style.display = tab === "invites" ? "block" : "none";

    if (tab === "users") filterUsers("Staff");
    if (tab === "moderation") loadModeration();
    if (tab === "invites") loadInvites();
}

/* ================= USERS ================= */

function filterUsers(role) {
    usersList.innerHTML = "";
    users.filter(u => u.role === role).forEach(u => {
        usersList.innerHTML += `<tr><td>${u.username}</td><td>${u.role}</td></tr>`;
    });
}

/* ================= MODERATION ================= */

function loadModeration() {
    modList.innerHTML = "";
    users.forEach((u, i) => {
        if (u.username === currentUser.username) return;

        let actions = `<button onclick="kick(${i})">Kick</button>`;

        if (currentUser.role === "Admin") {
            actions += `
                <button onclick="ban(${i})">Ban</button>
                <select onchange="setRole(${i}, this.value)">
                    <option ${u.role==="Staff"?"selected":""}>Staff</option>
                    <option ${u.role==="Moderator"?"selected":""}>Moderator</option>
                    <option ${u.role==="Admin"?"selected":""}>Admin</option>
                </select>
            `;
        }

        if (u.role === "Banned" && currentUser.role === "Admin") {
            actions = `<button onclick="unban(${i})">Unban</button>`;
        }

        modList.innerHTML += `
            <tr>
                <td>${u.username}</td>
                <td>${u.role}</td>
                <td>${actions}</td>
            </tr>
        `;
    });
}

function kick(i) {
    alert(users[i].username + " was kicked");
}

function ban(i) {
    users[i].role = "Banned";
    saveAll();
    loadModeration();
}

function unban(i) {
    users[i].role = "Staff";
    saveAll();
    loadModeration();
}

function setRole(i, role) {
    users[i].role = role;
    saveAll();
    loadModeration();
}

/* ================= INVITES ================= */

function sendInvite() {
    const username = inviteUser.value;
    if (!username) return alert("Enter a username");
    if (!users.find(u => u.username === username)) return alert("User not found");

    invites[username] = invites[username] || [];
    if (invites[username].includes("main-bar")) return alert("Already invited");

    invites[username].push("main-bar");
    saveAll();
    alert("Invite sent");
}

function loadInvites() {
    inviteList.innerHTML = "";
    const list = invites[currentUser.username] || [];

    if (list.length === 0) {
        inviteList.innerHTML = `<tr><td colspan="2">No invites</td></tr>`;
        return;
    }

    list.forEach(barId => {
        const bar = bars.find(b => b.id === barId);
        inviteList.innerHTML += `
            <tr>
                <td>${bar.name}</td>
                <td>
                    <button onclick="acceptInvite('${barId}')">Accept</button>
                    <button onclick="declineInvite('${barId}')">Decline</button>
                </td>
            </tr>
        `;
    });
}

function acceptInvite(barId) {
    const bar = bars.find(b => b.id === barId);
    if (!bar.members.includes(currentUser.username)) {
        bar.members.push(currentUser.username);
    }
    invites[currentUser.username] =
        invites[currentUser.username].filter(i => i !== barId);
    saveAll();
    loadInvites();
    alert("Joined the bar!");
}

function declineInvite(barId) {
    invites[currentUser.username] =
        invites[currentUser.username].filter(i => i !== barId);
    saveAll();
    loadInvites();
}

/* ================= AUTO LOGIN ================= */

if (currentUser) init();
</script>

</body>
</html>
``
