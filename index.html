<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bar Management, Invites & Scheduling</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1f1f1f;
  color: #eee;
  padding: 20px;
}
.panel {
  background: #333;
  padding: 20px;
  border-radius: 8px;
  max-width: 1200px;
  margin-bottom: 20px;
}
input, select, button {
  padding: 8px;
  width: 100%;
  margin: 5px 0;
}
button {
  background: #f4c430;
  border: none;
  cursor: pointer;
}
.tabs button {
  width: auto;
  margin-right: 5px;
}
ul {
  list-style: none;
  padding: 0;
}
li {
  padding: 6px;
  border-bottom: 1px solid #555;
}
table {
  width: 100%;
  border-collapse: collapse;
}
td, th {
  border: 1px solid #555;
  padding: 6px;
}
</style>
</head>
<body>

<h1>🍺 Bar Management System</h1>

<!-- AUTH -->
<div id="authPanel" class="panel">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="username" placeholder="Username (register)">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <p id="authStatus"></p>
</div>

<!-- APP -->
<div id="appPanel" class="panel" style="display:none;">
  <p id="userInfo"></p>

  <div class="tabs">
    <button onclick="showTab('bars')">Bars</button>
    <button onclick="showTab('schedule')">Schedule</button>
    <button onclick="showTab('invites')">Invites</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- BARS -->
  <div id="barsTab">
    <ul id="barList"></ul>
    <input id="newBarName" placeholder="New bar name">
    <button onclick="createBar()">Create Bar</button>
  </div>

  <!-- SCHEDULE -->
  <div id="scheduleTab" style="display:none;">
    <select id="scheduleUser"></select>

    <label><input type="checkbox" class="roleCheck" value="Bartender"> Bartender</label>
    <label><input type="checkbox" class="roleCheck" value="Security"> Security</label>

    <input type="date" id="scheduleDate">
    <input type="time" id="startTime">
    <input type="time" id="endTime">

    <button onclick="assignShift()">Assign Shift</button>

    <table>
      <thead>
        <tr><th>User</th><th>Roles</th><th>Date</th><th>Time</th></tr>
      </thead>
      <tbody id="scheduleTable"></tbody>
    </table>
  </div>

  <!-- INVITES -->
  <div id="invitesTab" style="display:none;">
    <h3>Invite User</h3>
    <input id="inviteUsername" placeholder="Username">
    <select id="inviteBar"></select>
    <button onclick="sendInvite()">Send Invite</button>

    <h3>Your Invites</h3>
    <ul id="inviteList"></ul>
  </div>
</div>

<!-- ✅ FIREBASE SDKs (CORRECT) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyCROUwb_jRNjHospqu86fvL9P4ajCe94c8",
  authDomain: "barthiiny.firebaseapp.com",
  projectId: "barthiiny",
  storageBucket: "barthiiny.firebasestorage.app",
  messagingSenderId: "496508474938",
  appId: "1:496508474938:web:3eae7b5b67fbcb77af8703",
  measurementId: "G-8ZZMBT7913"
});

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser, currentUsername, currentBarId;

/* AUTH */
function register() {
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .then(c => db.collection("users").doc(c.user.uid).set({ username: username.value }))
    .catch(e => authStatus.textContent = e.message);
}
function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(e => authStatus.textContent = e.message);
}
function logout() { auth.signOut(); }

/* STATE */
auth.onAuthStateChanged(async u => {
  if (!u) {
    authPanel.style.display = "block";
    appPanel.style.display = "none";
    return;
  }
  currentUser = u;
  const snap = await db.collection("users").doc(u.uid).get();
  currentUsername = snap.data().username;
  userInfo.textContent = "Logged in as " + currentUsername;
  authPanel.style.display = "none";
  appPanel.style.display = "block";
  loadBars();
  loadInvites();
});

/* UI */
function showTab(t) {
  barsTab.style.display = t === "bars" ? "block" : "none";
  scheduleTab.style.display = t === "schedule" ? "block" : "none";
  invitesTab.style.display = t === "invites" ? "block" : "none";
  if (t === "schedule") loadSchedule();
}

/* BARS */
function createBar() {
  db.collection("bars").add({
    name: newBarName.value,
    members: { [currentUser.uid]: ["Owner"] }
  });
}
function loadBars() {
  barList.innerHTML = "";
  inviteBar.innerHTML = "";
  db.collection("bars").onSnapshot(s => {
    barList.innerHTML = "";
    inviteBar.innerHTML = "";
    s.forEach(d => {
      const b = d.data();
      if (b.members[currentUser.uid]) {
        barList.innerHTML += `<li onclick="selectBar('${d.id}')">${b.name}</li>`;
        inviteBar.innerHTML += `<option value="${d.id}">${b.name}</option>`;
      }
    });
  });
}
function selectBar(id) {
  currentBarId = id;
  loadMembers();
  loadSchedule();
}

/* INVITES */
function sendInvite() {
  db.collection("invites").add({
    toUsername: inviteUsername.value,
    barId: inviteBar.value
  });
  inviteUsername.value = "";
}
function loadInvites() {
  inviteList.innerHTML = "";
  db.collection("invites")
    .where("toUsername","==",currentUsername)
    .onSnapshot(s => {
      inviteList.innerHTML = "";
      s.forEach(d => {
        inviteList.innerHTML += `
          <li>
            Bar Invite
            <button onclick="acceptInvite('${d.id}','${d.data().barId}')">Accept</button>
            <button onclick="declineInvite('${d.id}')">Decline</button>
          </li>`;
      });
    });
}
function acceptInvite(id, barId) {
  db.collection("bars").doc(barId).update({
    [`members.${currentUser.uid}`]: ["Member"]
  });
  db.collection("invites").doc(id).delete();
}
function declineInvite(id) {
  db.collection("invites").doc(id).delete();
}

/* SCHEDULING */
async function loadMembers() {
  const bar = (await db.collection("bars").doc(currentBarId).get()).data();
  scheduleUser.innerHTML = "";
  for (let uid in bar.members) {
    const u = await db.collection("users").doc(uid).get();
    scheduleUser.innerHTML += `<option value="${uid}">${u.data().username}</option>`;
  }
}
function assignShift() {
  const roles = [...document.querySelectorAll(".roleCheck:checked")].map(r => r.value);
  db.collection("schedules").add({
    barId: currentBarId,
    userId: scheduleUser.value,
    roles,
    date: scheduleDate.value,
    start: startTime.value,
    end: endTime.value
  });
}
function loadSchedule() {
  scheduleTable.innerHTML = "";
  if (!currentBarId) return;
  db.collection("schedules")
    .where("barId","==",currentBarId)
    .onSnapshot(async s => {
      scheduleTable.innerHTML = "";
      for (let d of s.docs) {
        const sc = d.data();
        const u = await db.collection("users").doc(sc.userId).get();
        scheduleTable.innerHTML += `
          <tr>
            <td>${u.data().username}</td>
            <td>${sc.roles.join(", ")}</td>
            <td>${sc.date}</td>
            <td>${sc.start} – ${sc.end}</td>
          </tr>`;
      }
    });
}
</script>

</body>
</html>
